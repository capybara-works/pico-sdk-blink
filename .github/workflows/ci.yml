name: Build and test (local-equivalent)

on:
  push:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PICO_SDK_PATH: ~/pico/pico-sdk
      SDK_VERSION: 2.0.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ---------------------------------------------------------
      # Cache Pico SDK
      # ---------------------------------------------------------
      - name: Cache Pico SDK
        id: cache-pico-sdk
        uses: actions/cache@v5
        with:
          path: ~/pico
          key: ${{ runner.os }}-pico-sdk-${{ env.SDK_VERSION }}

      # ---------------------------------------------------------
      # Install toolchain
      # ---------------------------------------------------------
      - name: Set up the toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            wget

          # Install ARM GCC 11.3.rel1 (Same as Devcontainer)
          wget https://developer.arm.com/-/media/Files/downloads/gnu/11.3.rel1/binrel/arm-gnu-toolchain-11.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar xf arm-gnu-toolchain-11.3.rel1-x86_64-arm-none-eabi.tar.xz
          sudo mv arm-gnu-toolchain-11.3.rel1-x86_64-arm-none-eabi /usr/local/arm-none-eabi
          echo "/usr/local/arm-none-eabi/bin" >> $GITHUB_PATH

      # ---------------------------------------------------------
      # Install Pico SDK if cache is missing
      # ---------------------------------------------------------
      - name: Set up the Pico SDK
        if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/pico
          cd ~/pico
          git clone https://github.com/raspberrypi/pico-sdk.git --depth 1 --branch ${SDK_VERSION}
          cd pico-sdk && git submodule update --init

      # ---------------------------------------------------------
      # Phase 1 evidence pipeline smoke test (no hardware in CI:
      # asserts hardware steps skip via safety gates, logic analyzer
      # stays stub, and verification.md is generated)
      # ---------------------------------------------------------
      - name: Build and run evidence smoke test
        run: |
          chmod +x ./scripts/*.sh
          ./scripts/ci_phase1_smoke.sh

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v7
        with:
          name: evidence
          path: evidence/latest/

      # ---------------------------------------------------------
      # Upload firmware (for later steps or manual download)
      # ---------------------------------------------------------
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: build/blink.*
          
  # ========================================================================
  # Wokwi CI test
  # ========================================================================
  test-on-wokwi:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Download evidence
        uses: actions/download-artifact@v8
        with:
          name: evidence
          path: evidence/latest

      - name: Download firmware
        uses: actions/download-artifact@v8
        with:
          name: firmware
          path: build

      - name: Test on Wokwi
        id: wokwi
        continue-on-error: true
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: .
          timeout: 5000
          scenario: 'blink.test.yaml'

      - name: Record Wokwi evidence
        if: always()
        run: |
          chmod +x ./scripts/*.sh
          ./scripts/record_wokwi_ci_result.sh "${{ steps.wokwi.outcome }}"
          python3 ./scripts/summarize_evidence.py

      - name: Upload evidence with Wokwi result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: evidence-with-wokwi
          path: evidence/latest/

      - name: Fail if Wokwi failed
        if: steps.wokwi.outcome != 'success'
        run: exit 1
